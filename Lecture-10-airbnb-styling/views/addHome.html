<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Home — Airbnb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --rose: #e8184d;
        --rose-dark: #c0133e;
        --cream: #fdf6ef;
        --charcoal: #1a1a2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--charcoal);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Noise */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* Grid lines */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(232, 24, 77, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(232, 24, 77, 0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
        z-index: 0;
      }

      .blob-tl {
        position: fixed;
        top: -20%;
        left: -10%;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 40% 40%,
          rgba(232, 24, 77, 0.13),
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }
      .blob-br {
        position: fixed;
        bottom: -20%;
        right: -10%;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 60% 60%,
          rgba(232, 24, 77, 0.09),
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
        animation: drift 8s ease-in-out infinite alternate;
      }
      @keyframes drift {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-20px, -20px);
        }
      }

      header {
        position: relative;
        z-index: 10;
        background: rgba(26, 26, 46, 0.75);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid rgba(232, 24, 77, 0.12);
      }
      .logo {
        font-family: "Cormorant Garamond", serif;
        font-weight: 700;
        font-size: 1.8rem;
        color: var(--rose);
        letter-spacing: -0.02em;
        text-decoration: none;
        position: relative;
      }
      .logo::after {
        content: "★";
        font-size: 0.42rem;
        position: absolute;
        top: 7px;
        right: -9px;
        color: var(--rose);
        opacity: 0.55;
      }
      .nav-link {
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(253, 246, 239, 0.4);
        text-decoration: none;
        transition: color 0.3s;
      }
      .nav-link:hover {
        color: var(--rose);
      }

      .stage {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        animation: fadeUp 0.9s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .eyebrow {
        font-size: 0.7rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--rose);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 1.4rem;
        animation: fadeUp 0.8s 0.1s ease both;
      }
      .eyebrow::before,
      .eyebrow::after {
        content: "";
        display: block;
        width: 1.8rem;
        height: 1px;
        background: var(--rose);
      }

      .page-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.8rem, 6vw, 5rem);
        font-weight: 600;
        color: var(--cream);
        line-height: 1.05;
        letter-spacing: -0.02em;
        text-align: center;
        margin-bottom: 0.8rem;
        animation: fadeUp 0.8s 0.15s ease both;
      }
      .page-title em {
        font-style: italic;
        color: var(--rose);
      }

      .page-sub {
        font-size: 0.92rem;
        color: rgba(253, 246, 239, 0.35);
        font-weight: 300;
        text-align: center;
        margin-bottom: 3rem;
        letter-spacing: 0.02em;
        animation: fadeUp 0.8s 0.2s ease both;
      }

      .form-wrap {
        width: 100%;
        max-width: 520px;
        animation: fadeUp 0.8s 0.25s ease both;
      }

      .input-label {
        display: block;
        font-size: 0.68rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(253, 246, 239, 0.35);
        font-weight: 500;
        margin-bottom: 0.6rem;
      }

      .input-wrap {
        position: relative;
        margin-bottom: 1.2rem;
      }
      .input-prefix {
        position: absolute;
        left: 1.1rem;
        top: 50%;
        transform: translateY(-50%);
        font-family: "Cormorant Garamond", serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--rose);
        pointer-events: none;
        z-index: 1;
      }

      .field-input {
        width: 100%;
        background: rgba(253, 246, 239, 0.04);
        border: 1px solid rgba(253, 246, 239, 0.1);
        color: var(--cream);
        font-family: "DM Sans", sans-serif;
        font-size: 1rem;
        padding: 1rem 1.2rem 1rem 2.8rem;
        outline: none;
        letter-spacing: 0.04em;
        transition:
          border-color 0.3s,
          background 0.3s,
          box-shadow 0.3s;
        clip-path: polygon(
          0 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% 100%,
          10px 100%,
          0 calc(100% - 10px)
        );
      }
      .field-input::placeholder {
        color: rgba(253, 246, 239, 0.18);
      }
      .field-input:focus {
        border-color: rgba(232, 24, 77, 0.5);
        background: rgba(232, 24, 77, 0.05);
        box-shadow: 0 0 0 4px rgba(232, 24, 77, 0.06);
      }

      .btn-register {
        width: 100%;
        background: var(--rose);
        color: white;
        border: none;
        padding: 1.05rem 2rem;
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-weight: 500;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        transition: all 0.4s;
        clip-path: polygon(
          0 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% 100%,
          10px 100%,
          0 calc(100% - 10px)
        );
      }
      .btn-register::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--rose-dark);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s ease;
      }
      .btn-register:hover::before {
        transform: scaleX(1);
      }
      .btn-register span,
      .btn-register svg {
        position: relative;
        z-index: 1;
      }
      .btn-register svg {
        transition: transform 0.3s;
      }
      .btn-register:hover svg {
        transform: translateX(4px);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 3.5rem 0 1.5rem;
        animation: fadeUp 0.8s 0.35s ease both;
      }
      .divider-line {
        flex: 1;
        height: 1px;
        background: rgba(253, 246, 239, 0.06);
      }
      .divider-text {
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(253, 246, 239, 0.2);
      }

      .trust-row {
        display: flex;
        justify-content: center;
        gap: 2.5rem;
        animation: fadeUp 0.8s 0.4s ease both;
      }
      .trust-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: rgba(253, 246, 239, 0.25);
        font-size: 0.72rem;
        letter-spacing: 0.06em;
      }
      .trust-item svg {
        color: rgba(232, 24, 77, 0.5);
        flex-shrink: 0;
      }

      footer {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 1.2rem;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        color: rgba(253, 246, 239, 0.15);
        border-top: 1px solid rgba(253, 246, 239, 0.04);
      }
    </style>
  </head>
  <body>
    <div class="blob-tl"></div>
    <div class="blob-br"></div>

    <header>
      <div
        style="
          max-width: 1200px;
          margin: 0 auto;
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 1.1rem 2rem;
        "
      >
        <a href="/" class="logo">airbnb</a>
        <nav style="display: flex; gap: 2.5rem; align-items: center">
          <a href="/" class="nav-link">Home</a>
          <a href="#" class="nav-link">Explore</a>
          <a href="#" class="nav-link" style="color: rgba(232, 24, 77, 0.65)"
            >Hosting</a
          >
        </nav>
      </div>
    </header>

    <main class="stage">
      <div class="eyebrow">Register your property</div>
      <h1 class="page-title">List your <em>home,</em><br />start earning.</h1>
      <p class="page-sub">Enter your registration number to get started.</p>

      <div class="form-wrap">
        <form action="/host/add-home" method="post">
          <label class="input-label" for="registration-no"
            >Registration Number</label
          >
          <div class="input-wrap">
            <span class="input-prefix">#</span>
            <input
              class="field-input"
              type="text"
              name="registration-no"
              id="registration-no"
              placeholder="e.g. 2024-BCN-00142"
              autocomplete="off"
            />
          </div>
          <button type="submit" class="btn-register">
            <span>Register</span>
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
        </form>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">Why hosts trust us</span>
          <div class="divider-line"></div>
        </div>

        <div class="trust-row">
          <div class="trust-item">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Host protection
          </div>
          <div class="trust-item">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
            Fast payouts
          </div>
          <div class="trust-item">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            Free to list
          </div>
        </div>
      </div>
    </main>

    <footer>© 2026 Airbnb Clone. All rights reserved.</footer>
  </body>
</html>
